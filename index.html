<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <title>Calculator App</title>
</head>
<body>
    <div class="main-cnt">
        <h1>Calculator</h1>
        <div class="cnt">
            <input type="text" value="0">
            <table>
                <tr>
                    <td class="operator"><div class="number-ope">C</div></td>
                    <td class="operator"><div class="number-ope">DEL</div></td>
                    <td class="operator"><div class="number-ope">/</div></td>
                    <td class="operator"><div class="number-ope">*</div></td>
                </tr>
                <tr>
                    <td><div class="number-ope">7</div></td>
                    <td><div class="number-ope">8</div></td>
                    <td><div class="number-ope">9</div></td>
                    <td class="operator"><div class="number-ope">-</div></td>
                </tr>
                <tr>
                    <td><div class="number-ope">4</div></td>
                    <td><div class="number-ope">5</div></td>
                    <td><div class="number-ope">6</div></td>
                    <td class="operator"><div class="number-ope">+</div></td>
                </tr>
                <tr>
                    <td><div class="number-ope">1</div></td>
                    <td><div class="number-ope">2</div></td>
                    <td><div class="number-ope">3</div></td>
                    <td class="operator" rowspan="2"><div class="number-ope">=</div></td>
                </tr>
                <tr>
                    <td><div class="number-ope">%</div></td>
                    <td><div class="number-ope">0</div></td>
                    <td><div class="number-ope">.</div></td>
                </tr>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
